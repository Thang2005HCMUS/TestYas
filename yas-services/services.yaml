apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: yas-microservices
  namespace: argocd
spec:
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://github.com/Thang2005HCMUS/yas
              revision: main
              directories:
                - path: k8s/charts/*
                - path: k8s/charts/Chart.template.yaml
                  exclude: true
                - path: k8s/charts/values.template.yaml
                  exclude: true
                - path: k8s/charts/backend
                  exclude: true
                - path: k8s/charts/ui
                  exclude: true
                - path: k8s/charts/location
                  exclude: true
                - path: k8s/charts/payment
                  exclude: true
                - path: k8s/charts/payment-paypal
                  exclude: true
                - path: k8s/charts/promotion
                  exclude: true
                - path: k8s/charts/rating
                  exclude: true
                - path: k8s/charts/recommendation
                  exclude: true
                - path: k8s/charts/webhook
                  exclude: true
                - path: k8s/charts/yas-configuration
                  exclude: true
          # SỬA TẠI ĐÂY: Bỏ khối 'template' gây lỗi, định nghĩa trực tiếp cho các App cụ thể
          - list:
              elements:
                - appName: backoffice-bff
                  ingressHost: backoffice.yas.local.com
                - appName: storefront-bff
                  ingressHost: storefront.yas.local.com
              # Dùng bổ sung để bọc giá trị fallback nếu appName không khớp bff
              template:
                metadata: {}
                spec: {}
  template:
    metadata:
      name: 'yas-{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/Thang2005HCMUS/yas
        targetRevision: main
        path: '{{path}}'
        helm:
          valueFiles:
            - values.yaml
          parameters:
            # Dùng logic so khớp tên trực tiếp ở tầng template để gán host
            - name: "backend.ingress.host"
              value: >-
                {{if eq .path.basename "backoffice-bff"}}backoffice.yas.local.com{{else if eq .path.basename "storefront-bff"}}storefront.yas.local.com{{else}}api.yas.local.com{{end}}
            - name: "backend.ingress.enabled"
              value: "true"
            - name: "ingress.host"
              value: "api.yas.local.com"
      destination:
        server: https://kubernetes.default.svc
        namespace: yas
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true