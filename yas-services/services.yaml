apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: yas-microservices
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/Thang2005HCMUS/yas
        revision: main
        directories:
          - path: k8s/charts/*
          - path: k8s/charts/Chart.template.yaml
            exclude: true
          - path: k8s/charts/values.template.yaml
            exclude: true
          - path: k8s/charts/backend
            exclude: true
          - path: k8s/charts/ui
            exclude: true
          - path: k8s/charts/location
            exclude: true
          - path: k8s/charts/payment
            exclude: true
          - path: k8s/charts/payment-paypal
            exclude: true
          - path: k8s/charts/promotion
            exclude: true
          - path: k8s/charts/rating
            exclude: true
          - path: k8s/charts/recommendation
            exclude: true
          - path: k8s/charts/webhook
            exclude: true
          - path: k8s/charts/yas-configuration
            exclude: true
  template:
    metadata:
      name: 'yas-{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/Thang2005HCMUS/yas
        targetRevision: main
        path: '{{path}}'
        helm:
          valueFiles:
            - values.yaml
          
          # --- ĐÂY LÀ PHẦN THAY THẾ CHO ĐOẠN SCRIPT SET INGRESS HOST ---
          valuesObject:
            backend:
              ingress:
                # Nếu là backoffice-bff -> backoffice.yas.local.com
                # Nếu là storefront-bff -> storefront.yas.local.com
                # Các service còn lại -> api.yas.local.com
                host: >-
                  {{- if eq .path.basename "backoffice-bff" }}backoffice.yas.local.com
                  {{- else if eq .path.basename "storefront-bff" }}storefront.yas.local.com
                  {{- else }}api.yas.local.com
                  {{- end }}
            
            # Khấu trừ riêng cho swagger-ui (vì cấu hình nằm ở root ingress, không qua block backend)
            ingress:
              host: api.yas.local.com
      destination:
        server: https://kubernetes.default.svc
        namespace: yas
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true