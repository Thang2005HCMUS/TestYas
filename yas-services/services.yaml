apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: yas-microservices
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/Thang2005HCMUS/yas
        revision: main
        directories:
          - path: k8s/charts/*
          - path: k8s/charts/Chart.template.yaml
            exclude: true
          - path: k8s/charts/values.template.yaml
            exclude: true
          - path: k8s/charts/backend
            exclude: true
          - path: k8s/charts/ui
            exclude: true
          - path: k8s/charts/location
            exclude: true
          - path: k8s/charts/payment
            exclude: true
          - path: k8s/charts/payment-paypal
            exclude: true
          - path: k8s/charts/promotion
            exclude: true
          - path: k8s/charts/rating
            exclude: true
          - path: k8s/charts/recommendation
            exclude: true
          - path: k8s/charts/webhook
            exclude: true
          - path: k8s/charts/yas-configuration
            exclude: true
  template:
    metadata:
      name: 'yas-{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/Thang2005HCMUS/yas
        targetRevision: main
        path: '{{path}}'
        helm:
          valueFiles:
            - values.yaml
          
          # --- DÙNG PARAMETERS ĐỂ TRUYỀN GIÁ TRỊ PHẲNG, TRÁNH LỖI PARSE CẤU TRÚC KHỐI YQ ---
          parameters:
            - name: "backend.ingress.host"
              value: >-
                {{if eq .path.basename "backoffice-bff"}}backoffice.yas.local.com{{else if eq .path.basename "storefront-bff"}}storefront.yas.local.com{{else}}api.yas.local.com{{end}}
            
            # Khấu trừ riêng cho swagger-ui gốc nếu có
            - name: "ingress.host"
              value: "api.yas.local.com"
      destination:
        server: https://kubernetes.default.svc
        namespace: yas
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true