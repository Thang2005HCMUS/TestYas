# 5. OpenTelemetry Collector (Local Chart trên Git)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opentelemetry-collector-yas
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Thang2005HCMUS/TestYas.git
    path: observability/opentelemetry
    targetRevision: main # Git repo nên dùng branch main là đúng
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# 6. Grafana Custom Configs (Local Chart trên Git)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-custom-configs-yas
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Thang2005HCMUS/TestYas.git
    path: observability/grafana
    targetRevision: main
    helm:
      valueFiles:
        - values.yaml
      parameters:
        - name: hostname
          value: "grafana.YOUR_DOMAIN"
        - name: grafana.username
          value: "YOUR_GRAFANA_USERNAME"
        - name: grafana.password
          value: "YOUR_GRAFANA_PASSWORD"
        - name: postgresql.username
          value: "YOUR_DB_USERNAME"
        - name: postgresql.password
          value: "YOUR_DB_PASSWORD"
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true