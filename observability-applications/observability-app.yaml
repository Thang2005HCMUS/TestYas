# 1. Prometheus Stack
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-yas
  namespace: argocd
spec:
  project: default
  sources:
    - chart: kube-prometheus-stack
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: "*" # Sửa HEAD thành "*" cho Helm chart
      helm:
        valueFiles:
          - $values/observability/prometheus.values.yaml
        parameters:
          - name: hostname
            value: "grafana.YOUR_DOMAIN" 
          - name: grafana.grafana\.ini.database.user
            value: "YOUR_DB_USER"
          - name: grafana.grafana\.ini.database.password
            value: "YOUR_DB_PASSWORD"
    - repoURL: https://github.com/Thang2005HCMUS/TestYas.git
      targetRevision: main # Git repo thì giữ nguyên nhánh (main/master/HEAD)
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

