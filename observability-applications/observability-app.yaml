# 5. OpenTelemetry Collector
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opentelemetry-collector-yas
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Thang2005HCMUS/TestYas.git
    path: observability/opentelemetry
    targetRevision: main
    helm:
      valueFiles:
        - values.yaml
        - cluster-config.yaml # Đường dẫn tương đối trỏ về thư mục gốc chứa cluster-config
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# 6. Grafana Custom Configs
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-custom-configs-yas
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Thang2005HCMUS/TestYas.git
    path: observability/grafana
    targetRevision: main
    helm:
      valueFiles:
        - values.yaml
        - ../cluster-config.yaml # Nạp file config
  
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true