# 1. Prometheus Stack
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-yas
  namespace: argocd
spec:
  project: default
  sources:
    - chart: kube-prometheus-stack
      repoURL: https://prometheus-community.github.io/helm-charts #[cite: 4]
      targetRevision: HEAD
      helm:
        valueFiles:
          - $values/observability/prometheus.values.yaml
    - repoURL: https://github.com/Thang2005HCMUS/TestYas.git # THAY BẰNG GIT CỦA BẠN
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability #[cite: 4]
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

