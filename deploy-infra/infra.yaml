---
# 1. PostgreSQL (Local Chart)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgres
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Thang2005HCMUS/TestYas.git
    path: k8s/deploy/postgres/postgresql
    targetRevision: main
    helm:
      valueFiles:
        - ./values.yaml
        - ../../cluster-config-gitOps.yaml # Lùi 2 cấp thư mục về k8s/deploy
  destination:
    server: https://kubernetes.default.svc
    namespace: postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# 2. Redis (External OCI Chart)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: registry-1.docker.io/bitnamicharts
      chart: redis
      targetRevision: 27.0.12
      helm:
        valueFiles:
          - $values/k8s/deploy/cluster-config-gitOps.yaml
    - repoURL: https://github.com/Thang2005HCMUS/TestYas.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: redis
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

