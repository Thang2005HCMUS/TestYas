---
# 8. AKHQ (External Chart + Multiple values)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: akhq
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://akhq.io/
      chart: akhq
      targetRevision: 0.27.0
      helm:
        valueFiles:
          - $values/k8s/deploy/cluster-config-gitOps.yaml
          - $values/k8s/deploy/kafka/akhq.values.yaml
    - repoURL: https://github.com/Thang2005HCMUS/TestYas.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

