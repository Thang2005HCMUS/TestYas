apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka-broker-pool
  labels:
    strimzi.io/cluster: kafka-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: {{ .Values.kafka.replicas }}
  roles:
    - broker
    - controller  # Thêm vai trò controller để tự quản trị, KHÔNG CẦN ZOOKEEPER
  storage:
    type: jbod
    volumes:
      - id: 0
        type: persistent-claim
        size: 2Gi
        storageClass: "standard"
        deleteClaim: false
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-cluster
  annotations:
    strimzi.io/node-pools: "enabled"
spec:
  kafka:
    version: 4.1.0  # Chỉ định phiên bản rõ ràng hỗ trợ tốt KRaft
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: tls
      - name: external
        port: 9094
        type: nodeport
        tls: false
    config:
      metadata.log.segment.bytes: 1073741824
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  # ĐÃ XÓA TOÀN BỘ BLOCK ZOOKEEPER ĐỂ CHẠY KRAFT NGUYÊN BẢN
  entityOperator:
    topicOperator: {}
    userOperator: {}