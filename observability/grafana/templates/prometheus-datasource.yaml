apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-datasource
  namespace: observability
spec:
  datasource:
    name: Prometheus
    type: prometheus
    url: http://prometheus-yas-kube-promet-prometheus.observability.svc.cluster.local:9090
    access: proxy
    isDefault: true
  instanceSelector:
    matchLabels:
      dashboards: "grafana" # Đảm bảo label này khớp với label của Grafana instance bạn đã tạo